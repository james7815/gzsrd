<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广州顺如电子科技有限公司 - {{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>SRD</h1>
            </div>
            <nav class="nav">
                <a href="{{ url_for('index') }}">首页</a>
                <a href="{{ url_for('about') }}">关于我们</a>
                <a href="{{ url_for('products') }}">产品中心</a>
                <a href="{{ url_for('contact') }}">联系我们</a>
            </nav>
        </div>
    </header>

    <!-- 核心内容区域 (子页面将在这里填充) -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 广州顺如电子科技有限公司 版权所有</p>
            <p>地址：广州市天河区高新技术开发区</p>
        </div>
    </footer>

</body>
</html>
